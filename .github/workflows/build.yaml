name: Build ZMK firmware

on:
  push:
  pull_request:

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      config_path: .
      build_matrix: |
        include:
          - board: nice_nano_v2
            shield: corne_hw_left
            cmake-args: -DSHIELD_ROOT=$GITHUB_WORKSPACE
          - board: nice_nano_v2
            shield: corne_hw_right
            cmake-args: -DSHIELD_ROOT=$GITHUB_WORKSPACE
